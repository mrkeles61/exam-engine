<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="IKU">
  <defs>
    <pattern id="iku-stripes" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#000000"/>
      <rect x="0" y="0" width="2" height="6" fill="#FFFFFF"/>
    </pattern>
    <clipPath id="iku-bl-clip">
      <polygon points="10,50 50,50 50,90"/>
    </clipPath>
  </defs>
  <polygon points="50,10 90,50 10,50" fill="#ED1C24"/>
  <polygon points="50,50 90,50 50,90" fill="#BFBFBF"/>
  <rect x="0" y="0" width="100" height="100" fill="url(#iku-stripes)" clip-path="url(#iku-bl-clip)"/>
  <polygon points="50,10 90,50 50,90 10,50" fill="none" stroke="#000000" stroke-width="1.5" stroke-linejoin="miter"/>
  <g font-family="Arial Black, Impact, Helvetica, sans-serif" font-weight="900" font-size="42" text-anchor="middle" dominant-baseline="central">
    <text x="56" y="54" fill="#BFBFBF">&#220;</text>
    <text x="44" y="52" fill="#ED1C24">K</text>
  </g>
</svg>
