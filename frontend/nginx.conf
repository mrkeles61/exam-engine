server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Increase upload size limit to match backend setting
    client_max_body_size 60M;

    # --- API proxy ---
    # Forwards all /api/* requests to the FastAPI container
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- Docs proxy (Swagger / ReDoc) ---
    location ~ ^/(docs|redoc|openapi\.json|health) {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
    }

    # --- SPA fallback ---
    # All other routes serve index.html so React Router handles navigation
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
